<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IC Portal – Innovation City Internal Requests</title>
    <meta name="description" content="Innovation City internal request portal for employees to raise and track workplace requests." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Noto Sans"', 'sans-serif'],
            },
            colors: {
              ic: {
                // Innovation City Official Palette
                darkBg: '#08151F',
                darkBg2: '#0B1F2A',
                darkBg3: '#0F2E3A',
                darkBg4: '#1a3a47',
                cyan: '#5ECAD4',
                cyanLight: '#6FD3E6',
                textWhite: '#FFFFFF',
                textMuted: '#C7D1D8',
                textDim: '#9FB2BD',
                success: '#16A34A',
                warning: '#D97706',
                danger: '#DC2626',
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Accessibility improvements */
      *:focus-visible {
        outline: 3px solid #5ECAD4;
        outline-offset: 2px;
      }
      body {
        background-color: #F9FAFB;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
